kind = "web"
previewPath = "/"
title = "Zest"
version = "1.0.0"
id = "artifacts/zest-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20287

[services.development]
run = "pnpm --filter @workspace/zest-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zest-website", "run", "build" ]
publicDir = "artifacts/zest-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20287"
BASE_PATH = "/"
